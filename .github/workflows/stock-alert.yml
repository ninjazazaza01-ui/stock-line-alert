name: Stock Drop Alert

on:
  schedule:
    # ช่วงก่อนตลาดเปิด (Pre-market ~4:00-9:30 ET) เช็คทุก 30 นาที
    - cron: "*/15 8-13 * * 1-5"
    # ช่วงตลาดเปิด (Regular hours ~9:30-16:00 ET) เช็คทุก 20 นาที
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch: {}   # ให้กดรันเองได้จากแท็บ Actions เพื่อทดสอบ

permissions:
  contents: write   # ต้องมีสิทธิ์เขียน เพื่อ commit state.json กลับเข้า repo

jobs:
  check-stocks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock check
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python check_stocks.py

      - name: Commit updated state
        run: |
          git config user.name "stock-alert-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update alert state [skip ci]"
          git push
